<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Costly Architecture</text>

  <!-- User Browser -->
  <rect x="340" y="60" width="220" height="44" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="87" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">User Browser</text>

  <!-- Arrow down -->
  <line x1="450" y1="104" x2="450" y2="130" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowIndigo)"/>
  <defs><marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6366f1"/></marker></defs>

  <!-- Nginx -->
  <rect x="350" y="130" width="200" height="40" rx="8" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="155" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="600">Nginx (SSL/Proxy)</text>
  <text x="450" y="167" text-anchor="middle" fill="#64748b" font-size="9">Port 80/443</text>

  <!-- Split arrows -->
  <line x1="400" y1="170" x2="250" y2="210" stroke="#38bdf8" stroke-width="1"/>
  <line x1="500" y1="170" x2="650" y2="210" stroke="#38bdf8" stroke-width="1"/>

  <!-- Frontend -->
  <rect x="130" y="210" width="240" height="55" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="233" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="700">Next.js 15 Frontend</text>
  <text x="250" y="250" text-anchor="middle" fill="#64748b" font-size="10">TypeScript + Tailwind + shadcn/ui</text>

  <!-- Backend -->
  <rect x="530" y="210" width="240" height="55" rx="10" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="233" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">FastAPI Backend</text>
  <text x="650" y="250" text-anchor="middle" fill="#64748b" font-size="10">Python + Pydantic + AsyncIO</text>

  <!-- Arrow Frontend to Backend -->
  <line x1="370" y1="237" x2="530" y2="237" stroke="#818cf8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="450" y="230" text-anchor="middle" fill="#64748b" font-size="9">/api/*</text>

  <!-- Backend children: 3 boxes -->
  <!-- AI Agent -->
  <rect x="490" y="290" width="130" height="40" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="555" y="314" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">AI Agent (15 tools)</text>

  <!-- Connectors -->
  <rect x="640" y="290" width="130" height="40" rx="6" fill="#1b3b2f" stroke="#10b981" stroke-width="1"/>
  <text x="705" y="314" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">15 Connectors</text>

  <!-- Scheduler -->
  <rect x="490" y="340" width="130" height="34" rx="6" fill="#2a1f1a" stroke="#f59e0b" stroke-width="1"/>
  <text x="555" y="361" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Scheduler (6h sync)</text>

  <!-- Encryption -->
  <rect x="640" y="340" width="130" height="34" rx="6" fill="#1a2332" stroke="#06b6d4" stroke-width="1"/>
  <text x="705" y="361" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">Fernet Encryption</text>

  <!-- Arrows to databases -->
  <line x1="555" y1="374" x2="350" y2="430" stroke="#f59e0b" stroke-width="1"/>
  <line x1="555" y1="374" x2="555" y2="430" stroke="#f59e0b" stroke-width="1"/>

  <!-- MongoDB -->
  <rect x="230" y="430" width="180" height="50" rx="10" fill="#1c2a1a" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="453" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">MongoDB 7</text>
  <text x="320" y="470" text-anchor="middle" fill="#64748b" font-size="9">Users, Costs, Connections, Alerts</text>

  <!-- Redis -->
  <rect x="470" y="430" width="170" height="50" rx="10" fill="#2a1a1a" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="453" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">Redis 7</text>
  <text x="555" y="470" text-anchor="middle" fill="#64748b" font-size="9">Cache + Scheduler Locks</text>

  <!-- External Platforms section -->
  <rect x="50" y="510" width="800" height="95" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="450" y="535" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="2">EXTERNAL PLATFORM APIs (read-only)</text>

  <!-- Platform boxes -->
  <rect x="70" y="548" width="95" height="42" rx="6" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1"/>
  <text x="117" y="573" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="600">Snowflake</text>

  <rect x="178" y="548" width="75" height="42" rx="6" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="215" y="573" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">AWS</text>

  <rect x="266" y="548" width="85" height="42" rx="6" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="308" y="573" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">dbt Cloud</text>

  <rect x="364" y="548" width="80" height="42" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="404" y="573" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">OpenAI</text>

  <rect x="457" y="548" width="90" height="42" rx="6" fill="#4a1d96" stroke="#8b5cf6" stroke-width="1"/>
  <text x="502" y="573" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Anthropic</text>

  <rect x="560" y="548" width="80" height="42" rx="6" fill="#7c2d12" stroke="#f97316" stroke-width="1"/>
  <text x="600" y="573" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">Fivetran</text>

  <rect x="653" y="548" width="80" height="42" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="693" y="573" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">BigQuery</text>

  <rect x="746" y="548" width="90" height="42" rx="6" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="791" y="573" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">+8 more</text>

  <!-- Arrow from connectors to platforms -->
  <line x1="705" y1="330" x2="705" y2="400" stroke="#10b981" stroke-width="1"/>
  <line x1="705" y1="400" x2="450" y2="510" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
