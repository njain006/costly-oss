name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests (pytest) ─────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run connector tests
        run: pytest tests/ -v --tb=short --co -q 2>/dev/null; pytest tests/ -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: test-key-not-real
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-report=html -v
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: test-key-not-real
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

  # ─── Frontend Unit Tests (Vitest) ───────────────────────────────
  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-next/coverage/

  # ─── Frontend Lint + Build ──────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-client-id

  # ─── Playwright E2E Tests ───────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    defaults:
      run:
        working-directory: frontend-next

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install backend
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Start backend
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0xMjM0NTY3ODk=
          REDIS_URL: redis://localhost:6379
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Install frontend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-client-id

      - name: Start frontend
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for services
        run: |
          sleep 5
          curl -sf http://localhost:8000/api/demo/dashboard?days=1 > /dev/null
          curl -sf http://localhost:3000 > /dev/null

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-next/playwright-report/

  # ─── No Secrets Check ──────────────────────────────────────────
  no-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for leaked secrets
        run: |
          # Check for common secret patterns in tracked files
          if git grep -lI 'sk-ant-api\|sk-proj-\|AKIA[A-Z0-9]\{16\}\|ghp_[a-zA-Z0-9]\{36\}' -- ':!.github' ':!*.md'; then
            echo "FAIL: Found potential secrets in tracked files!"
            exit 1
          fi
          echo "PASS: No secrets found"

      - name: Check no .env files committed
        run: |
          if git ls-files | grep -E '^(backend|frontend-next|frontend)/\.env(\.|$)' | grep -v '.example'; then
            echo "FAIL: Found .env files in tracked files!"
            exit 1
          fi
          echo "PASS: No .env files tracked"
