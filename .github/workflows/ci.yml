name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests (pytest) ─────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run connector tests
        run: pytest tests/ -v --tb=short --co -q 2>/dev/null; pytest tests/ -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: cAO06aRSqLUSmghjSsmYRzA0_NEqGcx-_3-FMKKsMPw=
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-report=html -v
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: cAO06aRSqLUSmghjSsmYRzA0_NEqGcx-_3-FMKKsMPw=
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/

  # ─── Connector Contract Tests ───────────────────────────────────
  # Fixture-driven contract tests + property tests + OpenAPI fuzz.
  # No live API access required — fixtures are checked into
  # backend/tests/fixtures/<platform>/ and re-recorded by maintainers when
  # vendor APIs change. See docs/testing/contract-tests.md.
  connector-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run connector contract + property tests
        run: pytest tests/contract/ -v --tb=short
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret-key-must-be-32-chars-ok
          ENCRYPTION_KEY: cAO06aRSqLUSmghjSsmYRzA0_NEqGcx-_3-FMKKsMPw=
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Install schemathesis
        run: pip install "schemathesis>=3.30,<4"

      - name: Dump OpenAPI spec
        run: python -m tests.contract.dump_openapi > openapi.json
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret-key-must-be-32-chars-ok
          ENCRYPTION_KEY: cAO06aRSqLUSmghjSsmYRzA0_NEqGcx-_3-FMKKsMPw=

      - name: Start backend for fuzz pass
        # Background uvicorn so schemathesis can hit it. Mongo + Redis are
        # mocked at request time via the demo data source so we don't need
        # to spin up service containers for this lightweight smoke pass.
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8001 &
          # Wait for healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/api/demo/dashboard?days=1 > /dev/null; then
              echo "backend up"; break
            fi
            sleep 1
          done
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret-key-must-be-32-chars-ok
          ENCRYPTION_KEY: cAO06aRSqLUSmghjSsmYRzA0_NEqGcx-_3-FMKKsMPw=
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Schemathesis fuzz pass (smoke — no 5xx, no schema mismatches)
        # ``--checks all`` runs every default check (status_code_conformance,
        # response_schema_conformance, content_type_conformance, etc.).
        # ``-x`` stops at the first failure so logs stay readable.
        # ``--hypothesis-max-examples=5`` keeps the run fast; bump up when
        # debugging a specific failure locally.
        # ``--exclude-method=POST`` is intentionally NOT used — POST endpoints
        # are the most likely to hide validation bugs. We instead skip
        # endpoints that legitimately need auth via -- excludes below.
        run: |
          schemathesis run openapi.json \
            --base-url http://localhost:8001 \
            --checks all \
            --hypothesis-max-examples=5 \
            -x \
            --exclude-path-regex '^/api/(auth|connections|sync|history)/' \
            || true
        # `|| true` keeps the smoke pass non-blocking on the first run while
        # we iterate. Once stable, remove the trailing `|| true` to make it
        # gating.

  # ─── Frontend Lint + Build ──────────────────────────────────────
  frontend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-next/coverage/

  # ─── Frontend Lint + Build ──────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-client-id

  # ─── Playwright E2E Tests ───────────────────────────────────────
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    defaults:
      run:
        working-directory: frontend-next

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install backend
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Start backend
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: costly_test
          JWT_SECRET: test-secret
          ENCRYPTION_KEY: cAO06aRSqLUSmghjSsmYRzA0_NEqGcx-_3-FMKKsMPw=
          REDIS_URL: redis://localhost:6379
          LLM_API_KEY: test-key
          LLM_PROVIDER: anthropic
          LLM_MODEL: test-model

      - name: Install frontend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-client-id

      - name: Start frontend
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for services
        run: |
          sleep 5
          curl -sf http://localhost:8000/api/demo/dashboard?days=1 > /dev/null
          curl -sf http://localhost:3000 > /dev/null

      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-next/playwright-report/

  # ─── No Secrets Check ──────────────────────────────────────────
  no-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for leaked secrets
        run: |
          # Skip tracked test fixtures + docs (AKIAIOSFODNN7EXAMPLE etc.
          # are AWS's documented public placeholders).
          MATCHES=$(git grep -lIE 'sk-ant-api[a-zA-Z0-9]+|sk-proj-[a-zA-Z0-9]+|ghp_[a-zA-Z0-9]{36,}' -- ':!.github' ':!*.md' ':!**/tests/**' ':!**/test/**' ':!**/fixtures/**' ':!**/__fixtures__/**' || true)
          # AWS keys: flag real-looking keys (alphanumeric mix), allow AKIAIOSFODNN7EXAMPLE
          # and any ...EXAMPLE suffix per AWS docs convention.
          AWS_MATCHES=$(git grep -lIE 'AKIA[A-Z0-9]{16}' -- ':!.github' ':!*.md' ':!**/tests/**' ':!**/test/**' ':!**/fixtures/**' | xargs -I{} grep -lE 'AKIA[A-Z0-9]{16}' {} 2>/dev/null | xargs -I{} grep -L 'EXAMPLE' {} 2>/dev/null || true)
          if [ -n "$MATCHES$AWS_MATCHES" ]; then
            echo "FAIL: Found potential secrets in tracked files!"
            echo "$MATCHES$AWS_MATCHES"
            exit 1
          fi
          echo "PASS: No real secrets found (test fixtures + AWS EXAMPLE keys allowed)"

      - name: Check no .env files committed
        run: |
          if git ls-files | grep -E '^(backend|frontend-next|frontend)/\.env(\.|$)' | grep -v '.example'; then
            echo "FAIL: Found .env files in tracked files!"
            exit 1
          fi
          echo "PASS: No .env files tracked"
